<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uyum Yönetimi - İç Sistemler Platformu</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set worker source
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Sanction sidebar is now visible with Emlak Katılım branding */

        .main-content {
            margin-left: 0 !important;
            width: 100% !important;
            padding: 20px !important;
        }

        .mobile-menu-btn {
            display: none !important;
        }

        /* Clean up header */
        .header {
            left: 0 !important;
            width: 100% !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <!--  Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/logo.png" alt="Emlak Katılım" class="logo"
                    style="height: 40px; width: auto; object-fit: contain;"
                    onerror="this.src='https://placehold.co/150x50?text=LOGO'">
            </div>
            <ul class="nav-links">
                <li class="nav-item">
                    <a class="nav-link active" data-page="dashboard">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Genel Bakış</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="scan">
                        <i data-lucide="scan-line"></i>
                        <span>Tarama Yap</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="results">
                        <i data-lucide="list"></i>
                        <span>Tarama Sonuçları</span>
                    </a>
                </li>
                <li class="nav-item"
                    style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                    <a class="nav-link" data-page="report"
                        style="background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); color: white; border-radius: 0.5rem;">
                        <i data-lucide="alert-triangle"></i>
                        <span>Şüpheli İşlem Bildir</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="reports-admin">
                        <i data-lucide="shield-check"></i>
                        <span>Bildirim Yönetimi</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-page="reports-analytics">
                        <i data-lucide="bar-chart-3"></i>
                        <span>Bildirim Raporları</span>
                    </a>
                </li>
                <li class="nav-item"
                    style="margin-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;">
                    <a class="nav-link" data-page="activity-log"
                        style="background: linear-gradient(135deg, #0f766e 0%, #0d9488 100%); color: white; border-radius: 0.5rem;">
                        <i data-lucide="scroll-text"></i>
                        <span>İşlem Geçmişi / Log</span>
                    </a>
                </li>

            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header"
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div style="display: flex; align-items: center;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 class="page-title" id="page-title">Genel Bakış</h1>
                </div>
                <div style="display: flex; align-items: center; gap: 1.5rem;">
                    <!-- Trash Button (Separated) -->
                    <button onclick="navigateTo('trash')" style="
                            background: none;
                            border: none;
                            cursor: pointer;
                            padding: 0.5rem;
                            color: var(--text-light);
                            transition: color 0.2s;
                            margin-right: 1rem;
                            border-right: 1px solid var(--border);
                            padding-right: 1.5rem;
                        " onmouseover="this.style.color='var(--primary)'"
                        onmouseout="this.style.color='var(--text-light)'" title="Silinen Kayıtlar">
                        <i data-lucide="trash-2" style="width: 20px; height: 20px;"></i>
                    </button>

                    <!-- User Profile -->
                    <div class="user-profile" style="text-align: right;">
                        <div style="font-weight: 600; font-size: 0.9rem; color: #111827;">Sistem Yöneticisi</div>
                        <div style="font-size: 0.8rem; color: #6b7280;">admin</div>
                    </div>

                    <!-- Icons Group -->
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <!-- Home Button -->
                        <button onclick="window.top.location.href='/'"
                            style="background:none; border:none; cursor:pointer; padding:0.5rem; color:var(--text-light);"
                            title="Ana Ekrana Dön">
                            <i data-lucide="home" style="width: 20px; height: 20px;"></i>
                        </button>

                        <!-- Settings Button -->
                        <button onclick="navigateTo('settings')"
                            style="background:none; border:none; cursor:pointer; padding:0.5rem; color:var(--text-light);"
                            title="Ayarlar">
                            <i data-lucide="settings" style="width: 20px; height: 20px;"></i>
                        </button>

                        <!-- Logout Button -->
                        <button onclick="alert('Çıkış yapılıyor...')"
                            style="background:none; border:none; cursor:pointer; padding:0.5rem; color:var(--text-light);"
                            onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--text-light)'"
                            title="Çıkış Yap">
                            <i data-lucide="log-out" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
            </header>

            <div class="content-area" id="main-view">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div>

    <!-- Modal for Report Details/Edit -->
    <div id="details-modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); justify-content: center; align-items: center;">
        <div style="background: white; padding: 2rem; border-radius: 1rem; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);"
            id="details-content">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- Scripts -->
    <script src="sanctions_data.js"></script>
    <script src="masak_data.js"></script>
    <script src="sanctions_db.js"></script>
    <script src="rg_alert_status.js"></script>
    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
