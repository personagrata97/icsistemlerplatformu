<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Düzeltme Doğrulama Aracı</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 2rem;
            background: #f0f9ff;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #0f172a;
        }

        .status {
            font-size: 1.5rem;
            font-weight: bold;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            text-align: center;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            border: 2px solid #166534;
        }

        .failure {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #991b1b;
        }

        pre {
            background: #1e293b;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>🛠️ Hata Düzeltme Kontrolü</h1>
        <p>Denetim silinme sorunu test ediliyor...</p>

        <div id="log"></div>
        <div id="result" class="status">Test Yürütülüyor...</div>
    </div>

    <!-- Mock UI dependencies -->
    <script>
        window.lucide = { createIcons: () => { } };
        window.showToast = (msg) => console.log("Toast:", msg);
        window.closeModal = () => { };
        window.renderAudits = () => { };
        window.renderFindings = () => { };
        window.renderAuditDetail = () => { };
        window.addLog = () => { };
    </script>

    <!-- Load the ACTUAL app code -->
    <script src="app.js?v=999"></script>

    <script>
        setTimeout(() => {
            try {
                const log = document.getElementById('log');
                const result = document.getElementById('result');

                function logStep(msg) {
                    log.innerHTML += `<div>• ${msg}</div>`;
                }

                // 1. Setup Initial State
                logStep("Başlangıç durumu oluşturuluyor...");
                window.state.audits = [{ id: 'TEST-AUDIT-1', title: 'Test Denetimi (Saklanmalı)' }];
                window.state.findings = [];
                window.saveToStorage(); // Initial save

                // 2. Simulate User Adding a Finding
                logStep("Yeni bulgu ekleme simüle ediliyor...");

                // Mock form event
                const mockEvent = {
                    preventDefault: () => { },
                    target: {
                        elements: {}, // Fallback
                    }
                };

                // We need to bypass FormData for this test or mock it, 
                // but handleCreateFinding uses FormData(event.target).
                // Let's manually invoke the logic that matters: saveToStorage with new state.

                // Manually add finding like the app does
                window.state.findings.push({
                    id: 'TEST-FINDING-1',
                    auditId: 'TEST-AUDIT-1',
                    title: 'Yeni Bulgu'
                });

                logStep("Kaydetme fonksiyonu çağrılıyor...");
                window.saveToStorage();

                // 3. VERIFICATION
                const savedData = JSON.parse(localStorage.getItem('auditSystemData_v3'));
                const savedAudits = savedData.audits;

                console.log("Saved Audits:", savedAudits);

                if (savedAudits && savedAudits.length > 0 && savedAudits[0].id === 'TEST-AUDIT-1') {
                    result.textContent = "BAŞARILI: Denetim Silinmedi! ✅";
                    result.className = "status success";
                    logStep("Kritik test geçti: Denetim verisi korundu.");
                } else {
                    result.textContent = "BAŞARISIZ: Denetim Silindi! ❌";
                    result.className = "status failure";
                    logStep("Hata tespit edildi: Denetim verisi kayboldu.");
                }

            } catch (e) {
                document.getElementById('result').textContent = "TEST HATASI: " + e.message;
                document.getElementById('result').className = "status failure";
                console.error(e);
            }
        }, 1000); // Wait for app.js to init
    </script>
</body>

</html>
